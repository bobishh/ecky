events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;

    server {
        listen 80;
        server_name localhost;
        root /usr/share/nginx/html;
        index index.html;

        # ── Health check (Kamal proxy) ──────────────────────
        location /health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }

        # ── Docs: Ecky IR Field Guide ───────────────────────
        # /docs and /docs/ serve the field guide HTML.
        # /docs/assets/ serves the rendered example images.
        location = /docs {
            return 301 /docs/;
        }
        location /docs/ {
            alias /usr/share/nginx/html/docs/;
            try_files $uri $uri/ /docs/index.html;
        }

        # ── Long-cache immutable assets ─────────────────────
        location ~* \.(js|wasm|css|png|jpg|jpeg|gif|ico|svg|epub|woff2?)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
            try_files $uri =404;
        }

        # ── Landing SPA fallback ────────────────────────────
        location / {
            try_files $uri $uri/ /index.html;
        }
    }
}

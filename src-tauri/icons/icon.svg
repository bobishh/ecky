<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Metallic Bronze Gradient -->
    <linearGradient id="metalGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8e6d15;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#c8a620;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#5e4a0d;stop-opacity:1" />
    </linearGradient>
    
    <!-- Shading filter -->
    <filter id="innerShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="8" result="blur"/>
      <feOffset dx="4" dy="4"/>
      <feComposite in2="SourceAlpha" operator="arithmetic" k2="-1" k3="1" result="shadow"/>
      <feFlood flood-color="#000" flood-opacity="0.6"/>
      <feComposite in2="shadow" operator="in"/>
      <feComposite in2="SourceGraphic" operator="over"/>
    </filter>
  </defs>

  <!-- Background Plate (Full bleed dark) -->
  <rect width="512" height="512" rx="80" fill="#111524"/>
  
  <!-- Centered Content Group (Scaled down to 65%) -->
  <g transform="translate(179, 154) scale(0.3)" filter="url(#innerShadow)">
    <!-- The Base (Scaled spheres) -->
    <circle cx="120" cy="700" r="140" fill="url(#metalGrad)" stroke="#1a1a2e" stroke-width="15"/>
    <circle cx="400" cy="700" r="140" fill="url(#metalGrad)" stroke="#1a1a2e" stroke-width="15"/>
    
    <!-- The Shaft -->
    <rect x="160" y="200" width="200" height="550" rx="100" fill="url(#metalGrad)" stroke="#1a1a2e" stroke-width="15"/>
    
    <!-- The Apex -->
    <path d="M160 250 C 160 0, 360 0, 360 250" fill="#8e6d15" stroke="#1a1a2e" stroke-width="15"/>
    
    <!-- Detailing / Fancy Ridges -->
    <g stroke="#1a1a2e" stroke-width="20" fill="none" opacity="0.4">
      <path d="M180 350 Q 260 370, 340 350"/>
      <path d="M180 450 Q 260 470, 340 450"/>
      <path d="M180 550 Q 260 570, 340 550"/>
    </g>
  </g>
</svg>
